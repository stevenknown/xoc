CFLAG: -O3 -only-cfgopt -lowest_height -no-cg -dump-aa

CHECK-EXIST:starray:*<1> (elemtype:*<1>)

CHECK-HEAD:ist:*<1>
CHECK-NEXT:    add:*<4>            
CHECK-NEXT:        lda:*<8> 'type'            
CHECK-NEXT:        $7:u32        
CHECK-NEXT:    lda:*<6> '_const_string_1'
CHECK-NEXT:  MD37 -- base:Var66(type)
CHECK-NEXT:    POINT TO:
CHECK-NEXT:      MD7 -- base:Var67(#DedicatedStringVar)

#the number of leading blank must be 4.
CHECK-HEAD-EXACT:    array:*<1> (elemtype:*<1>)
CHECK-NEXT:        elemnum[2]
CHECK-NEXT:    intconst:i32 0|0x0 dim0
CHECK-NEXT:    lda:*<8> 'type' array_base
CHECK-NEXT: MD13 -- base:Var66(type)
CHECK-NEXT:   POINT TO:
CHECK-NEXT:     MD7 -- base:Var67(#DedicatedStringVar)



